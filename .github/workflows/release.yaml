name: Release

on:
  push:
    tags:
      - "v*"

env:
  BINARY_NAME: tact
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          crate_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "tact") | .version')
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "Tag version $tag_version does not match crate version $crate_version" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
    steps:
      - name: Checkout sources
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: cross
      - name: Build with Cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Build with cross
        if: matrix.use_cross
        run: cross build --locked --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          package_name="${BINARY_NAME}-${{ matrix.target }}-${GITHUB_REF_NAME}"

          mkdir "$package_name"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$package_name/"
          cp README.md LICENSE.md "$package_name/"
          tar -czf "$package_name.${{ matrix.archive_ext }}" "$package_name"
          shasum -a 256 "$package_name.${{ matrix.archive_ext }}" > "$package_name.${{ matrix.archive_ext }}.sha256"
      - name: Upload packaged binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.target }}-${{ github.ref_name }}.${{ matrix.archive_ext }}
            ${{ env.BINARY_NAME }}-${{ matrix.target }}-${{ github.ref_name }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish-crate:
    name: Publish to crates.io
    if: ${{ false }} # Enable when Nanocodex is available from crates.io.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Verify crate package
        run: cargo publish --locked --dry-run
      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: dist
          merge-multiple: true
      - name: Publish release and generated changelog
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
